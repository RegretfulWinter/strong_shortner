# ============================================
# Nginx Configuration for URL Shortener
# Load Balancer for Scalability Quest
# ============================================

events {
    worker_connections 1024;
}

http {
    # Upstream: Define the Flask app backend pool
    # Docker Compose DNS will resolve 'app' to all app service containers
    upstream flask_app {
        least_conn;  # Load balancing method: least connections
        
        # When scaling with docker-compose up --scale app=3
        # Nginx will automatically discover all app instances via Docker DNS
        server app:5000 weight=5;
        
        # Health check (nginx-plus) or passive check
        # Mark server as down after 3 failures
        server app:5000 backup;  # Backup server
    }

    # Rate Limiting (Scalability - prevent overload)
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=shortcode:10m rate=100r/s;

    # Logging format with response time
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" rt=$request_time '
                    'uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" '
                    'urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;

    server {
        listen 80;
        server_name localhost;

        # Health check endpoint (for load balancer health probes)
        location /nginx-health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # Main application - Rate limited
        location / {
            limit_req zone=api burst=20 nodelay;
            
            proxy_pass http://flask_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Timeouts
            proxy_connect_timeout 5s;
            proxy_send_timeout 10s;
            proxy_read_timeout 10s;
        }

        # Short code redirect - Higher rate limit (read-heavy operation)
        location ~ ^/[a-zA-Z0-9]+$ {
            limit_req zone=shortcode burst=50 nodelay;
            
            proxy_pass http://flask_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Static files (if serving frontend)
        location /static {
            alias /var/www/static;
            expires 1d;
            add_header Cache-Control "public, immutable";
        }
    }
}
