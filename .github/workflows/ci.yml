name: CI/CD Pipeline

on:
  push:
    branches: ['**']  # 所有分支都触发测试
  pull_request:
    branches: [main]   # PR 到 main 时触发完整检查

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: hackathon_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Wait for PostgreSQL
        run: |
          for i in {1..10}; do
            pg_isready -h localhost -p 5432 && break
            sleep 2
          done

      - name: Initialize database
        env:
          DATABASE_HOST: localhost
          DATABASE_PORT: 5432
          DATABASE_NAME: hackathon_db
          DATABASE_USER: postgres
          DATABASE_PASSWORD: postgres
        run: uv run python init_db.py

      - name: Run tests with coverage
        env:
          DATABASE_HOST: localhost
          DATABASE_PORT: 5432
          DATABASE_NAME: hackathon_db
          DATABASE_USER: postgres
          DATABASE_PASSWORD: postgres
        run: uv run pytest tests/ -v --cov=app --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

      - name: Check code style
        run: uv run ruff check . || true

  docker-build:
    name: Build & Test Docker
    runs-on: ubuntu-latest
    needs: test
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker build -t url-shortener:test .

      - name: Start all services
        run: |
          docker compose up -d
          sleep 15

      - name: Test Nginx endpoint
        run: |
          curl -f http://localhost:80/health || exit 1

      - name: Cleanup
        run: docker compose down

  # ==========================
  # Quest-Specific Checks
  # ==========================
  
  reliability-check:
    name: Reliability Quest Check
    runs-on: ubuntu-latest
    needs: test
    if: startsWith(github.ref, 'refs/heads/quest/reliability') || github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
          
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"
          
      - name: Check coverage threshold
        run: |
          uv sync --all-extras --dev
          uv run pytest tests/ --cov=app --cov-report=term
          # Bronze: 0%, Silver: 50%, Gold: 70%

  scalability-check:
    name: Scalability Quest Check
    runs-on: ubuntu-latest
    needs: docker-build
    if: startsWith(github.ref, 'refs/heads/quest/scalability') || github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install -y k6
          
      - name: Start services
        run: |
          docker compose up -d
          sleep 15
          
      - name: Run load test (Bronze: 50 users)
        run: |
          k6 run --vus 50 --duration 30s tests/load_test_simple.js || true

  deploy:
    name: Deploy to Vultr
    runs-on: ubuntu-latest
    needs: [test, docker-build]
    # 只有 main 分支且不是 PR 时才部署
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vultr
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VULTR_HOST }}
          username: ${{ secrets.VULTR_USER }}
          key: ${{ secrets.VULTR_SSH_KEY }}
          script: |
            cd /var/www/url-shortener
            git pull origin main
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            docker system prune -f
