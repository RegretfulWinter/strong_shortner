# Docker Compose for Chaos Mode Demo
# Uses 'always' restart policy for auto-recovery

version: '3.8'

services:
  app:
    build: .
    environment:
      - DATABASE_HOST=postgres
      - DATABASE_NAME=hackathon_db
      - DATABASE_USER=postgres
      - DATABASE_PASSWORD=postgres
      - DATABASE_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - FLASK_ENV=production
    depends_on:
      - postgres
      - redis
    restart: always
    # Map port directly for demo (avoiding conflict)
    ports:
      - "5001:5000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - backend

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: always
    networks:
      - backend

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=hackathon_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5433:5432"
    restart: always
    networks:
      - backend

networks:
  backend:
    driver: bridge
