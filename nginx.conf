# ============================================
# Nginx Configuration for URL Shortener
# Load Balancer + Graceful Error Handling
# ============================================

events {
    worker_connections 1024;
}

http {
    # Upstream: Define the Flask app backend pool
    # Scalability Silver: 3 app instances for horizontal scaling
    upstream flask_app {
        least_conn;
        server app1:5000 weight=5;
        server app2:5000 weight=5;
        server app3:5000 weight=5;
    }

    # Rate Limiting - Increased for load testing
    limit_req_zone $binary_remote_addr zone=api:10m rate=1000r/s;
    limit_req_zone $binary_remote_addr zone=shortcode:10m rate=2000r/s;

    # Logging format
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" rt=$request_time';

    access_log /var/log/nginx/access.log main;

    server {
        listen 80;
        server_name localhost;

        # Custom error pages for graceful degradation
        # Returns JSON when backend is unavailable
        # Graceful error handling: Return JSON when backend is down
        # This prevents users from seeing nginx error pages or stack traces
        error_page 502 503 504 =503 @service_unavailable;
        
        location @service_unavailable {
            add_header Content-Type application/json;
            return 503 '{"error": "Service Unavailable", "message": "The service is temporarily unavailable. Please try again shortly.", "status": 503}';
        }

        # Health check endpoint
        location /nginx-health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # Main application
        location / {
            limit_req zone=api burst=20 nodelay;
            
            proxy_pass http://flask_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Timeouts
            proxy_connect_timeout 5s;
            proxy_send_timeout 10s;
            proxy_read_timeout 10s;
            
            # Intercept errors for graceful handling
            proxy_intercept_errors on;
        }

        # Short code redirect
        location ~ ^/[a-zA-Z0-9]+$ {
            limit_req zone=shortcode burst=50 nodelay;
            
            proxy_pass http://flask_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            
            proxy_intercept_errors on;
        }
    }
}
