global:
  smtp_smarthost: 'localhost:587'
  smtp_from: 'alert@example.com'

# The root route on which each incoming alert enters.
route:
  # The labels by which incoming alerts are grouped together.
  group_by: ['alertname', 'severity']
  
  # When a new group of alerts is created by an incoming alert, wait at
  # least 'group_wait' to send the initial notification.
  group_wait: 30s
  
  # When the first notification was sent, wait 'group_interval' to send a batch
  # of new alerts that started firing for that group.
  group_interval: 5m
  
  # If an alert has successfully been sent, wait 'repeat_interval' to
  # resend them.
  repeat_interval: 4h
  
  # A default receiver
  receiver: 'default'
  
  # The child route trees.
  routes:
    - match:
        severity: critical
      receiver: 'critical'
      continue: true

receivers:
  - name: 'default'
    # Discord webhook configuration for Incident Response Quest
    # Uncomment and fill in your webhook URL:
    # discord_configs:
    #   - webhook_url: 'YOUR_DISCORD_WEBHOOK_URL'
    #     title: '{{ range .Alerts }}{{ .Annotations.summary }}{{ end }}'
    #     message: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'
    
    # Or use Slack:
    # slack_configs:
    #   - api_url: 'YOUR_SLACK_WEBHOOK_URL'
    #     channel: '#alerts'

  - name: 'critical'
    # Add PagerDuty, OpsGenie, or other critical alerting here
    # For hackathon demo, can also send to Discord with @everyone
    discord_configs: []
